<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .product-info {
            margin: 20px 0;
            color: #666;
        }
        .price {
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
            margin: 15px 0;
        }
        .btn-whatsapp {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-whatsapp:hover {
            background: #1ead53;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Compra Ahora!</h1>
        <div class="product-info">
            <p>Producto de Calidad</p>
            <p>Entrega rápida y segura</p>
        </div>
        <a href="https://wa.link/m4krhi"
           class="btn-whatsapp" target="_blank">
            💬 Comprar por WhatsApp
        </a>    
    </div>
</body>
</html>
